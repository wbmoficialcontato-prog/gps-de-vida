<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPS de Vida &mdash; Jornada Identidade &amp; Prop&oacute;sito</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --cream: #F7F3ED;
    --text-dark: #2C2419;
    --text-mid: #6B5B47;
    --text-light: #A89880;
    --gold: #C4923A;
    --border: rgba(196, 146, 58, 0.18);
    --bubble-bot: rgba(255,255,255,0.7);
  }
  body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--text-dark); min-height: 100vh; display: flex; flex-direction: column; }
  header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(247,243,237,0.92); backdrop-filter: blur(12px); border-bottom: 0.5px solid var(--border); padding: 0 24px; height: 64px; display: flex; align-items: center; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 36px; height: 36px; border-radius: 50%; background: var(--text-dark); display: flex; align-items: center; justify-content: center; }
  .logo-icon svg { width: 18px; height: 18px; }
  .logo-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 500; color: var(--text-dark); line-height: 1.1; }
  .logo-sub { font-size: 10px; font-weight: 300; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); }
  main { flex: 1; padding-top: 64px; padding-bottom: 120px; display: flex; flex-direction: column; }
  #messages { flex: 1; padding: 32px 0; display: flex; flex-direction: column; }
  .msg-wrap { padding: 6px 24px; display: flex; flex-direction: column; animation: fadeSlide 0.35s ease forwards; opacity: 0; max-width: 760px; margin: 0 auto; width: 100%; }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg-wrap.user { align-items: flex-end; }
  .msg-wrap.bot { align-items: flex-start; }
  .bubble { max-width: 72%; padding: 14px 18px; border-radius: 18px; font-size: 15px; line-height: 1.65; font-weight: 300; }
  .msg-wrap.user .bubble { background: var(--text-dark); color: #F7F3ED; border-radius: 18px 18px 4px 18px; }
  .msg-wrap.bot .bubble { background: var(--bubble-bot); color: var(--text-dark); border: 0.5px solid var(--border); border-radius: 18px 18px 18px 4px; backdrop-filter: blur(8px); }
  .bot-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--text-dark); display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
  .bot-avatar svg { width: 14px; height: 14px; }
  .typing-bubble { background: var(--bubble-bot); border: 0.5px solid var(--border); border-radius: 18px 18px 18px 4px; padding: 14px 20px; display: flex; gap: 5px; align-items: center; }
  .typing-bubble span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-light); animation: bounce 1.2s infinite; }
  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }
  #welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 48px 24px; text-align: center; gap: 20px; }
  .welcome-icon { width: 72px; height: 72px; border-radius: 50%; background: var(--text-dark); display: flex; align-items: center; justify-content: center; }
  .welcome-icon svg { width: 32px; height: 32px; }
  .welcome-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 400; color: var(--text-dark); }
  .welcome-sub { font-size: 14px; font-weight: 300; color: var(--text-mid); max-width: 340px; line-height: 1.7; }
  .welcome-verse { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 15px; color: var(--text-light); max-width: 300px; line-height: 1.6; }
  .welcome-divider { width: 40px; height: 0.5px; background: var(--gold); opacity: 0.5; }
  #input-area { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(247,243,237,0.95); backdrop-filter: blur(16px); border-top: 0.5px solid var(--border); padding: 16px 24px 24px; z-index: 100; }
  .input-inner { max-width: 760px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  #user-input { flex: 1; background: white; border: 0.5px solid var(--border); border-radius: 22px; padding: 13px 20px; font-family: 'Jost', sans-serif; font-size: 15px; font-weight: 300; color: var(--text-dark); outline: none; resize: none; max-height: 140px; line-height: 1.5; transition: border-color 0.2s; }
  #user-input::placeholder { color: var(--text-light); }
  #user-input:focus { border-color: rgba(196,146,58,0.4); }
  #send-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--text-dark); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s, transform 0.1s; }
  #send-btn:hover { background: #4a3d2e; }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #send-btn svg { width: 18px; height: 18px; }
  .input-hint { text-align: center; font-size: 11px; color: var(--text-light); margin-top: 10px; letter-spacing: 0.04em; }
  .error-bubble { background: rgba(180,60,60,0.08); border: 0.5px solid rgba(180,60,60,0.2); color: #8B3333; padding: 12px 16px; border-radius: 12px; font-size: 13px; }
  @media (max-width: 600px) { .bubble { max-width: 88%; } }
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#F7F3ED" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
    </div>
    <div>
      <div class="logo-name">GPS de Vida</div>
      <div class="logo-sub">Jornada Identidade &amp; Prop&oacute;sito</div>
    </div>
  </div>
</header>

<main>
  <div id="welcome">
    <div class="welcome-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#F7F3ED" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
    </div>
    <div class="welcome-title">Seja bem-vindo &agrave; sua Jornada</div>
    <div class="welcome-sub">Estou aqui para caminhar com voc&ecirc; atrav&eacute;s de Identidade &amp; Prop&oacute;sito. Comece quando estiver pronto.</div>
    <div class="welcome-divider"></div>
    <div class="welcome-verse">"Pois somos cria&ccedil;&atilde;o de Deus, realizados em Cristo Jesus." &mdash; Ef 2:10</div>
  </div>
  <div id="messages" style="display:none;">
    <div id="msg-inner"></div>
  </div>
</main>

<div id="input-area">
  <div class="input-inner">
    <textarea id="user-input" placeholder="Escreva sua resposta..." rows="1"></textarea>
    <button id="send-btn" aria-label="Enviar">
      <svg viewBox="0 0 24 24" fill="none" stroke="#F7F3ED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
    </button>
  </div>
  <div class="input-hint">Suas respostas sao confidenciais &middot; GPS de Vida por WBM</div>
</div>

<script>
const SYSTEM_PROMPT = `Voce eh o GPS de Vida — o tutor da Jornada Identidade & Proposito, criado pela WBM.

APRESENTACAO INICIAL (apenas na primeira mensagem da conversa)
Apresente-se como GPS de Vida. Explique brevemente como a jornada funciona:
- A jornada eh dividida em 7 Modulos, cada um com aulas
- A pessoa avanca no seu proprio ritmo, sem pressa
- Cada sessao eh um espaco seguro e confidencial
- Voce estara presente em cada passo, fazendo perguntas guiadas e convidando para reflexao e oracao
- O objetivo nao eh resolver tudo de uma vez, mas caminhar com intencao
Depois pergunte o nome da pessoa e o que a trouxe ate aqui.
NAO repita essa apresentacao nas proximas mensagens.

REGRA OURO
Cada modulo tem SEQUENCIA RIGIDA. Voce nao determina quando termina. A estrutura determina.
Voce NUNCA tenta resolver tudo. Voce abre, aprofunda LEVEMENTE, depois convida oracao/reflexao e avanca.
Parar antes de resolver demais eh sua sabedoria.

TOM
Contemplativo, nunca acelerado
Humano, nunca robotico
Calmo, nunca pressiona
Acolhedor, nunca julga
Estruturado, segue a sequencia
Profundamente presente

TERMINOLOGIA CORRETA
Use sempre: "Orar", "Tempo especial com Deus", "Espirito Santo", "Biblia", "versiculos"
NUNCA use: missa, confissao, santos, rosario, padre, rezar, sagrado, divino

REFERENCIAS DE TEMPO
Use sempre linguagem atemporal:
"Na proxima sessao" (nao "amanha")
"Na sessao anterior" (nao "ontem")
"Neste modulo" (nao "esta semana")
"Ate o nosso proximo encontro" (nao "ate la")
"Quando voce estiver pronto para continuar"
"Voce avanca no seu proprio ritmo"

MEMORIA SILENCIOSA
Registre internamente nome, profissao, fase de vida, objetivo no curso, medos, crencas limitantes, padroes emocionais, historias marcantes, virtudes desejadas, versiculos que tocam, habitos, relacionamentos marcantes.
Use naturalmente: "Na sessao anterior voce falou que... como esta isso hoje?"

QUANDO FAZER PAUSA ESTRATEGICA
Se a reflexao esta ficando muito profunda: NAO conclua, reconheca que algo importante foi tocado, convide para ORAR e MEDITAR, peca para REGISTRAR, diga "vamos continuar esse processo", AVANCE SEM RESOLVER.

ESTRUTURA DE CADA AULA
Abertura/continuidade -> Contexto -> Texto biblico -> Perguntas guiadas (uma por vez) -> Aprofundamento leve -> Pausa estrategica -> Exercicio -> Fechamento. Nunca conclua. Sempre deixe espaco para o Espirito Santo.

MODULO 1 - A GRANDE PERGUNTA
AULA 1: Abertura sobre perguntas existenciais. Pergunta 1: sentido do mundo. Pergunta 2: sentido da vida. Pergunta 3: sentido da sua vida. Salmos 139:13 ou Efesios 1:4-6. Fechamento: "Quando estiver pronto, avancamos para a Aula 2."

AULA 2: O PROPOSITO DA CRIACAO. Colossenses 1:15-23. Cristo como centro. Exercicio escrito. Fechamento: "Quando estiver pronto, avancamos para a Aula 3."

AULA 3: DEUS TE FEZ DE PROPOSITO. Salmos 139:13-16 + Efesios 1:4-6. Reflexao guiada diante de Deus. Tempo especial com Deus. Fechamento do Modulo 1: "Quando estiver pronto, nos encontramos no Modulo 2."

MODULO 2 - IDENTIDADE E HISTORIA
AULA 1: Continuidade: "Na sessao anterior, voce abriu espaco para reflexoes profundas. Como voce esta?" Identidade em Deus. Efesios 2:10. Fechamento: "Quando estiver pronto, avancamos para a Aula 2."

AULA 2: 10 perguntas sobre historia pessoal (uma por vez). Dons e indigancoes. Fechamento: "Quando estiver pronto, avancamos para a Aula 3."

AULA 3: Romanos 12:2. Mapa de padroes: Pensamento -> Sentimento -> Comportamento. 3 versiculos de sustentacao. Fechamento do Modulo 2: "Quando estiver pronto, nos encontramos no Modulo 3."

MODULO 3 - HABITOS, ROTINA E CONSTRUCAO
AULA 1: Continuidade: "Na sessao anterior, voce refletiu sobre identidade e historia. Hoje vamos transformar consciencia em movimento pratico." Roda de Competencias em 9 areas (0-10). Plano de acao para area prioritaria. Fechamento: "Quando estiver pronto, avancamos para a Aula 2."

AULA 2: Habitos positivos e negativos. Habito-chave de transformacao. Fechamento: "Quando estiver pronto, avancamos para a Aula 3."

AULA 3: Micro habito: Por que + Como + Controle. Fechamento do Modulo 3: "Quando estiver pronto, nos encontramos no Modulo 4."

MODULO 4 - PADROES, PROTECAO E MATURIDADE
AULA 1: Continuidade: "Na sessao anterior, voce trabalhou com habitos. Hoje vamos olhar para os padroes internos." Sabotadores: Perfeccionismo, Hipervigilancia, Controle, Procrastinacao, Necessidade de aprovacao, Critica excessiva, Fuga. Fechamento: "Quando estiver pronto, avancamos para a Aula 2."

AULA 2: 9 tendencias emocionais (Eneagrama como ferramenta, nao rotulo). Fechamento: "Quando estiver pronto, avancamos para a Aula 3."

AULA 3: Maturidade em Cristo. Versiculos de autocompassao: Romanos 8:1, Salmos 139:14, 2 Corintios 5:17. Fechamento do Modulo 4: "Quando estiver pronto, nos encontramos no Modulo 5."

MODULO 5 - RELACIONAMENTOS E AS 5 LINGUAGENS DO AMOR
AULA 1: Continuidade: "Na sessao anterior, voce trabalhou com padroes. Hoje vamos ver como as pessoas ao seu redor influenciam tudo isso." 5 pessoas mais proximas e influencia de cada uma. Fechamento: "Quando estiver pronto, avancamos para a Aula 2."

AULA 2: Limites saudaveis. Amar com sabedoria. Fechamento: "Quando estiver pronto, avancamos para a Aula 3."

AULA 3: 5 Linguagens do Amor: Palavras de afirmacao, Tempo de qualidade, Presentes, Atos de servico, Toque fisico. Fechamento do Modulo 5: "Quando estiver pronto, nos encontramos no Modulo 6."

MODULO 6 - DIRECAO, PROPOSITO E ALINHAMENTO
AULA 1: Renovacao da mente - pensamento central da jornada.
AULA 2: Proposito em uma frase.
AULA 3: Hierarquia de 5 Valores em ordem de importancia. Ritual diario.
AULA 4: Virtude a cultivar.
AULA 5: Competencias principais.
AULA 6: Momento UAU - percepcao espiritual de Cristo trabalhando na jornada.
AULA 7: Visao e Missao articuladas.
AULA 8: Proximo passo concreto e possivel.
Fechamento do Modulo 6: "Quando estiver pronto, nos encontramos no Modulo 7."

MODULO 7 - CONSOLIDACAO E ENVIO
AULA 1: "Chegamos ao ultimo modulo. Vamos olhar para tudo que foi caminhado." Mudancas percebidas desde o Modulo 1.

AULA 2: Memorial narrativo em 5 partes: O Inicio -> O que foi Revelado -> O que Comecou a Nascer -> Verdades que Marcaram -> Quem Voce Esta Se Tornando.

AULA 3: 3 praticas de continuidade: espiritual, relacional, pratica. Despedida: "Voce caminhou por toda essa jornada de transformacao. O Espirito Santo conhece cada passo que voce vai dar. Bem-vindo a vida de proposito."

REGRAS OPERACIONAIS
Quando sai do tema: "Vamos permanecer nessa reflexao antes de avancar."
Quando profundo demais: convide oracao, registre, avance sem resolver.
Nunca conclua por ela. Ritmo: a pessoa avanca quando estiver pronta. Nunca pressione.`;

let history = [];
let isLoading = false;
const messagesDiv = document.getElementById('messages');
const msgInner = document.getElementById('msg-inner');
const welcome = document.getElementById('welcome');
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

function formatText(t) {
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\n/g, '<br>');
  return t;
}

function appendMessage(role, text) {
  if (welcome.style.display !== 'none') { welcome.style.display = 'none'; messagesDiv.style.display = 'flex'; }
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;
  if (role === 'bot') {
    const av = document.createElement('div'); av.className = 'bot-avatar';
    av.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#F7F3ED" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>';
    wrap.appendChild(av);
  }
  const bubble = document.createElement('div'); bubble.className = 'bubble';
  bubble.innerHTML = role === 'bot' ? formatText(text) : text.replace(/\n/g, '<br>');
  wrap.appendChild(bubble);
  msgInner.appendChild(wrap);
  wrap.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function showTyping() {
  const wrap = document.createElement('div'); wrap.className = 'msg-wrap bot'; wrap.id = 'typing-wrap';
  const av = document.createElement('div'); av.className = 'bot-avatar';
  av.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#F7F3ED" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>';
  const t = document.createElement('div'); t.className = 'typing-bubble';
  t.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(av); wrap.appendChild(t); msgInner.appendChild(wrap);
  wrap.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function removeTyping() { const t = document.getElementById('typing-wrap'); if (t) t.remove(); }

async function sendMessage() {
  const text = input.value.trim();
  if (!text || isLoading) return;
  isLoading = true; sendBtn.disabled = true;
  input.value = ''; input.style.height = 'auto';
  appendMessage('user', text);
  history.push({ role: 'user', content: text });
  showTyping();
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 1000, system: SYSTEM_PROMPT, messages: history })
    });
    const data = await res.json();
    removeTyping();
    if (data.error) { appendMessage('bot', '<div class="error-bubble">Algo deu errado. Tente novamente.</div>'); }
    else { const reply = data.content?.[0]?.text || ''; appendMessage('bot', reply); history.push({ role: 'assistant', content: reply }); }
  } catch(e) { removeTyping(); appendMessage('bot', '<div class="error-bubble">Erro de conexao. Tente novamente.</div>'); }
  isLoading = false; sendBtn.disabled = false; input.focus();
}

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 140) + 'px'; });
</script>
</body>
</html>
